<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">

</head>

<body>
    <div class="card">
        <h2>Crear Cuenta</h2>
        <input type="text" id="nombre" placeholder="Nombre completo" />
        <input type="email" id="email" placeholder="Correo electrónico" />
        <input type="text" id="telefono" placeholder="Teléfono (opcional)" />
        <input type="password" id="password" placeholder="Contraseña" />
        <input type="password" id="password2" placeholder="Confirmar contraseña" />
        <button onclick="registro()">Registrarse</button>
        <div class="mensaje" id="mensaje"></div>
        <div class="link">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>
        </div>
    </div>
</body>
<script src="{{ url_for('static', filename='js/registro.js') }}"></script>
</html>
